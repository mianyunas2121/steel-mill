version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: smms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: steel_mill_db
    ports:
      - '5432:5432'
    volumes:
      - smms_pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

volumes:
  smms_pgdata:
